<!--
Gearhead's Gazette Homepage Module

This component should render the latest or featured Gazette posts by reading
article frontmatter from /content/*.md.

Frontmatter mapping:
- title -> post.title
- image -> post.image
- image_alt -> post.image_alt
- excerpt -> post.excerpt
- slug -> /gearheads-gazette/[slug]

Homepage placeholder mapping:
- {{ post_1_title }}
- {{ post_1_image }}
- {{ post_1_image_alt }}
- {{ post_1_excerpt }}
- {{ post_1_url }}
- {{ post_1_cta_text }}

Notes:
- Designed for 2 posts currently (can scale to more later)
- Layout is responsive (grid to stacked mobile)
- Keep image aspect ratio consistent (19:11)
-->

<section class="gearheads-gazette-module">
  <div class="gearheads-gazette-inner">
    <div class="gearheads-gazette-header">
      <img
        class="gearheads-gazette-logo"
        src="https://hobbyetc.my.canva.site/kraton-promo-final-website/_assets/media/af78cd0712dc6b0beb688812b32cdb2d.png"
        alt="Gearhead's Gazette"
      />
    </div>

    <div class="gearheads-gazette-list">
      <article class="gearheads-gazette-row">
        <!--
          Gazette post 1 image slot
          src -> post.image
          alt -> post.image_alt
          href -> /gearheads-gazette/[slug]
        -->
        <a class="gearheads-gazette-image-link" href="{{ post_1_url }}">
          <img
            class="gearheads-gazette-image"
            src="{{ post_1_image }}"
            alt="{{ post_1_image_alt }}"
          />
        </a>

        <div class="gearheads-gazette-content">
          <!-- Gazette post 1 title slot -> post.title -->
          <h3>{{ post_1_title }}</h3>
          <!-- Gazette post 1 excerpt slot -> post.excerpt -->
          <p>{{ post_1_excerpt }}</p>
          <!-- Gazette post 1 CTA slot: text + /gearheads-gazette/[slug] -->
          <a class="gearheads-gazette-button" href="{{ post_1_url }}">{{ post_1_cta_text }}</a>
        </div>
      </article>

      <article class="gearheads-gazette-row">
        <!--
          Gazette post 2 image slot
          src -> post.image
          alt -> post.image_alt
          href -> /gearheads-gazette/[slug]
        -->
        <a class="gearheads-gazette-image-link" href="{{ post_2_url }}">
          <img
            class="gearheads-gazette-image"
            src="{{ post_2_image }}"
            alt="{{ post_2_image_alt }}"
          />
        </a>

        <div class="gearheads-gazette-content">
          <!-- Gazette post 2 title slot -> post.title -->
          <h3>{{ post_2_title }}</h3>
          <!-- Gazette post 2 excerpt slot -> post.excerpt -->
          <p>{{ post_2_excerpt }}</p>
          <!-- Gazette post 2 CTA slot: text + /gearheads-gazette/[slug] -->
          <a class="gearheads-gazette-button" href="{{ post_2_url }}">{{ post_2_cta_text }}</a>
        </div>
      </article>
    </div>
  </div>
</section>

<style>
  .gearheads-gazette-module {
    background: #ffffff;
    padding: 40px 0 56px;
    font-family: Roboto, Arial, sans-serif;
  }

  .gearheads-gazette-inner {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 24px;
    box-sizing: border-box;
  }

  .gearheads-gazette-header {
    width: 100%;
    text-align: center;
  }

  .gearheads-gazette-logo {
    display: block;
    width: min(420px, 90%);
    max-width: 100%;
    height: auto;
    margin: 0 auto 28px;
  }

  .gearheads-gazette-list {
    display: flex;
    flex-direction: column;
    gap: 28px;
    width: 100%;
  }

  .gearheads-gazette-row {
    display: grid;
    grid-template-columns: 190px minmax(0, 1fr);
    column-gap: 24px;
    align-items: center;
    width: 100%;
  }

  .gearheads-gazette-image-link {
    display: block;
    width: 100%;
    margin-bottom: 0;
  }

  .gearheads-gazette-image {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 19 / 11;
    object-fit: cover;
    border-radius: 12px;
  }

  .gearheads-gazette-content {
    min-width: 0;
    overflow: hidden;
  }

  .gearheads-gazette-content h3 {
    margin: 0 0 10px;
    font-size: 16px;
    line-height: 1.35;
    font-weight: 700;
    color: #111111;
  }

  .gearheads-gazette-content p {
    margin: 0 0 14px;
    font-size: 12px;
    line-height: 1.6;
    font-weight: 400;
    color: #1f1f1f;
  }

  .gearheads-gazette-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    padding: 0 16px;
    background: #ee7625;
    color: #ffffff;
    text-decoration: none;
    border-radius: 999px;
    font-size: 12px;
    line-height: 1;
    font-weight: 700;
  }

  .gearheads-gazette-button:hover {
    background: #d96518;
  }

  @media (max-width: 767px) {
    .gearheads-gazette-module {
      padding: 32px 0 44px;
    }

    .gearheads-gazette-inner {
      padding: 0 16px;
    }
  }

  @media (max-width: 700px) {
    .gearheads-gazette-row {
      grid-template-columns: 1fr;
      row-gap: 14px;
    }

    .gearheads-gazette-image-link {
      display: block;
      width: 100%;
      margin-bottom: 6px;
    }

    .gearheads-gazette-image {
      width: 100%;
      max-width: none;
      margin: 0;
    }

    .gearheads-gazette-content {
      text-align: left;
    }
  }
</style>
