<!--
Gearhead's Gazette Article Template

This template renders a single Gazette article from /content/*.md

Frontmatter mapping:
- article.title -> H1
- article.image -> hero image
- article.image_alt -> hero alt
- article.excerpt -> optional intro
- article.date -> optional meta
- article.content -> HTML converted from markdown (DO NOT ESCAPE)
- article.slug -> /gearheads-gazette/[slug]

IMPORTANT:
article.content must be rendered as HTML (markdown → HTML).
Do not escape as plain text.
-->

<section class="gazette-article-module">
  <div class="gazette-article-wrapper">

    <!-- Hero -->
    <div class="gazette-hero">
      <img
        class="gazette-hero-image"
        src="{{ article.image }}"
        alt="{{ article.image_alt }}"
      />
    </div>

    <!-- Title -->
    <div class="gazette-header">
      <h1 class="gazette-title">{{ article.title }}</h1>
      <div class="gazette-accent"></div>

      <!-- Optional meta -->
      <!-- If no date, this can be hidden by renderer -->
      <p class="gazette-meta">{{ article.date }}</p>
    </div>

    <!-- Article Body -->
    <div class="gazette-article-body">
      <!--
      article.content should be rendered as HTML converted from markdown.
      Do not escape HTML.
      -->
      {{ article.content }}
    </div>

    <!-- Related posts placeholder -->
    <!-- Future: render 2–3 related Gazette posts here -->
    <div class="gazette-related-placeholder"></div>

  </div>
</section>

<style>
  .gazette-article-module {
    background: #ffffff;
    font-family: Roboto, Arial, sans-serif;
  }

  .gazette-article-wrapper {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px 16px 40px;
    box-sizing: border-box;
  }

  /* Hero */

  .gazette-hero {
    margin-bottom: 20px;
  }

  .gazette-hero-image {
    width: 100%;
    height: auto;
    border-radius: 14px;
    display: block;
  }

  /* Header */

  .gazette-header {
    text-align: center;
    margin-bottom: 18px;
  }

  .gazette-title {
    font-size: 26px;
    line-height: 1.2;
    font-weight: 700;
    color: #111111;
    margin-bottom: 10px;
  }

  .gazette-accent {
    width: 60px;
    height: 4px;
    background: #ee7625;
    margin: 0 auto 12px;
    border-radius: 2px;
  }

  .gazette-meta {
    font-size: 12px;
    color: #666;
  }

  /* Body */

  .gazette-article-body {
    max-width: 720px;
    margin: 0 auto;
    font-size: 14px;
    line-height: 1.6;
    color: #1f1f1f;
  }

  .gazette-article-body h2 {
    margin-top: 28px;
    margin-bottom: 10px;
    font-size: 18px;
    font-weight: 700;
  }

  .gazette-article-body h3 {
    margin-top: 20px;
    margin-bottom: 8px;
    font-size: 16px;
    font-weight: 700;
  }

  .gazette-article-body p {
    margin-bottom: 12px;
  }

  .gazette-article-body ul {
    margin: 10px 0 16px 18px;
  }

  .gazette-article-body li {
    margin-bottom: 6px;
  }

  .gazette-article-body a {
    color: #283a90;
    text-decoration: underline;
  }

  .gazette-article-body strong {
    font-weight: 700;
  }

  /* Mobile */

  @media (max-width: 767px) {
    .gazette-title {
      font-size: 22px;
    }

    .gazette-article-body {
      font-size: 13px;
    }
  }
</style>
