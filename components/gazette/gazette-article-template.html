<!--
  Gearhead's Gazette Article Template

  Purpose:
  Render a single Gazette article from existing /content/*.md files without
  changing the markdown article structure.

  Data mapping for Loren:
  - article.title comes from frontmatter.title
  - article.image comes from frontmatter.image
  - article.image_alt comes from frontmatter.image_alt
  - article.excerpt comes from frontmatter.excerpt
  - article.date is optional frontmatter date/published_at metadata
  - article.content comes from the markdown body converted to HTML
  - article.slug / article.url should resolve to /gearheads-gazette/[slug]

  Important:
  - article.content should be rendered as HTML converted from markdown
  - article.content should not be escaped as plain text
  - "Keep Your Rig Dialed" should render naturally from the markdown body
  - Related posts can be added later at the bottom of the template
-->

<article class="gazette-article-page">
  <!-- Optional site/header placeholder -->
  <header class="gazette-site-header">
    <!-- Replace with shared site header include/render -->
    <div class="gazette-site-header-inner">
      <a class="gazette-site-logo" href="/">
        <span>Hobby Etc</span>
      </a>
    </div>
  </header>

  <main class="gazette-article-main">
    <div class="gazette-article-shell">
      <header class="gazette-article-header">
        <!-- Hero image: article.image / article.image_alt -->
        <figure class="gazette-article-hero-wrap">
          <img
            class="gazette-article-hero"
            src="{{ article.image }}"
            alt="{{ article.image_alt }}"
          />
        </figure>

        <!-- Article title: article.title -->
        <h1 class="gazette-article-title">{{ article.title }}</h1>

        <div class="gazette-article-accent" aria-hidden="true"></div>

        <!-- Optional date/meta line: article.date -->
        <p class="gazette-article-meta">
          {{ article.date | default: "Gearhead's Gazette" }}
        </p>

        <!-- Optional summary: article.excerpt -->
        <p class="gazette-article-excerpt">{{ article.excerpt }}</p>
      </header>

      <!--
        Markdown body render slot
        article.content must be HTML converted from markdown and rendered directly.
      -->
      <section class="gazette-article-body">
        {{ article.content }}
      </section>

      <section class="gazette-related-posts">
        <!--
          Optional related posts placeholder.
          Related posts can be rendered here later if needed.
        -->
      </section>
    </div>
  </main>
</article>
